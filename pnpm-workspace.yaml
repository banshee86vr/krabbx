packages:
  - frontend
  - backend

enablePrePostScripts: true

overrides:
  defu: '>=6.1.5'
  picomatch: '>=4.0.4'
  hono: '>=4.12.25'
  '@hono/node-server': '>=1.19.13'
  postcss: '>=8.5.10'
  shell-quote: '>=1.8.4'
  fast-uri: '>=3.1.2'
  ws: '>=8.21.0'
  qs: '>=6.15.2'

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - prisma

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
