services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: renovate-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-renovate_dashboard}
    # Postgres 18+ images expect a single mount at /var/lib/postgresql (not .../data only).
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for session storage and Socket.io adapter)
  redis:
    image: redis:8-alpine
    container_name: renovate-dashboard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: renovate-dashboard-backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Override via NODE_ENV=development for local/demo stacks with AUTH_ENABLED=false (disallowed when production).
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-renovate_dashboard}
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_ORG: ${GITHUB_ORG:-}
      GITHUB_TARGETS: ${GITHUB_TARGETS:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      ALLOW_INSECURE_NOAUTH: ${ALLOW_INSECURE_NOAUTH:-false}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      GITHUB_AUTH_CLIENT_ID: ${GITHUB_AUTH_CLIENT_ID:-}
      GITHUB_AUTH_CLIENT_SECRET: ${GITHUB_AUTH_CLIENT_SECRET:-}
      GITHUB_AUTH_TEAM_SLUG: ${GITHUB_AUTH_TEAM_SLUG:-}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: renovate-dashboard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:5173:8080"  # Map host port 5173 to container port 8080 (non-root user)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database migrations (run once)
  migrations:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: renovate-dashboard-migrations
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-renovate_dashboard}
    command: sh -c "cd /workspace/backend && pnpm exec prisma migrate deploy"
    restart: "no"

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: renovate-dashboard-network
