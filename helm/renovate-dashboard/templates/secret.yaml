{{- if not .Values.postgresql.auth.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "renovate-dashboard.postgresql.secretName" . }}
  labels:
    {{- include "renovate-dashboard.postgresql.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-user: {{ .Values.postgresql.auth.username | quote }}
  postgres-password: {{ .Values.postgresql.auth.password | default (randAlphaNum 32) | quote }}
{{- end }}

{{- if and .Values.redis.auth.enabled (not .Values.redis.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "renovate-dashboard.redis.secretName" . }}
  labels:
    {{- include "renovate-dashboard.redis.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ .Values.redis.auth.password | default (randAlphaNum 32) | quote }}
{{- end }}

{{- if not .Values.backend.github.existingSecret }}
{{- $authEnabled := true }}
{{- if hasKey .Values.backend.github "authEnabled" }}
{{- $authEnabled = .Values.backend.github.authEnabled }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "renovate-dashboard.github.secretName" . }}
  labels:
    {{- include "renovate-dashboard.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  github-token: {{ required "backend.github.token is required" .Values.backend.github.token | quote }}
  github-auth-client-id: {{ if $authEnabled }}{{ required "backend.github.authClientId is required when authEnabled" .Values.backend.github.authClientId | quote }}{{ else }}""{{ end }}
  github-auth-client-secret: {{ if $authEnabled }}{{ required "backend.github.authClientSecret is required when authEnabled" .Values.backend.github.authClientSecret | quote }}{{ else }}""{{ end }}
{{- end }}

{{- if not .Values.backend.session.existingSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "renovate-dashboard.session.secretName" . }}
  labels:
    {{- include "renovate-dashboard.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  session-secret: {{ .Values.backend.session.secret | default (randAlphaNum 64) | quote }}
{{- end }}

